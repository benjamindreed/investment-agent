name: Market Scan

on:
  schedule:
    # Every 2 hours Mon–Fri during US market hours.
    # US Eastern (EDT, UTC-4 in summer):  9:30am, 11:30am, 1:30pm, 3:30pm
    # Cron fires at 13:30, 15:30, 17:30, 19:30 UTC (covers EDT; 1hr early in EST winter)
    - cron: '30 13,15,17,19 * * 1-5'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scan
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python screener_job.py
